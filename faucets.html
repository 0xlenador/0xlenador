    <style>
        /* Clases de utilidad */
        .hidden {
            display: none !important;
        }

        /* RELLENO VERDE (El que querías) */
        .highlight {
            background-color: #10b981 !important;
            /* Verde Esmeralda */
            color: #020617 !important;
            /* Texto casi negro */
            border-color: #10b981 !important;
            font-weight: bold !important;
            opacity: 1 !important;
        }

        /* APAGADO */
        .dimmed {
            opacity: 0.15 !important;
        }

        /* Pestaña activa */
        .active-tab {
            background-color: #059669 !important;
            color: white !important;
        }
    </style>

    <script>
        let activeTab = 'all';

        function setTab(type, btn) {
            activeTab = type;
            // Resetear botones de pestañas
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-slate-500');
            });
            btn.classList.add('active-tab');
            btn.classList.remove('text-slate-500');
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.item-card');

            cards.forEach(card => {
                const type = card.getAttribute('data-type');
                const tags = card.querySelectorAll('.tag');

                let hasQueryMatch = false;
                let tabMatch = (activeTab === 'all' || type === activeTab);

                tags.forEach(t => {
                    const txt = t.innerText.toLowerCase();

                    if (q !== "" && txt.includes(q)) {
                        // Si coincide: Relleno Verde
                        t.classList.add('highlight');
                        t.classList.remove('dimmed');
                        hasQueryMatch = true;
                    } else if (q !== "") {
                        // Si hay búsqueda pero este tag no coincide: Opaco
                        t.classList.remove('highlight');
                        t.classList.add('dimmed');
                    } else {
                        // Si no hay búsqueda: Normal
                        t.classList.remove('highlight', 'dimmed');
                    }
                });

                // LÓGICA DE VISIBILIDAD DE LA TARJETA
                // Se muestra si: coincide la pestaña Y (el buscador está vacío O hubo coincidencia en tags)
                if (tabMatch && (q === "" || hasQueryMatch)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
